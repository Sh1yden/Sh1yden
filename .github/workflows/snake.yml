name: generate animation

on:
  # запуск каждые 24 часа
  schedule:
    - cron: "0 0 * * *" 
  
  # возможность запустить вручную через вкладку Actions
  workflow_dispatch:
  
  # запуск при каждом пуше в master ветку
  push:
    branches:
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # генерация svg змейки
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8a2be2&color_dots=#161b22,#392b5a,#5e3a8c,#8a2be2,#bc8cf2

      # пуш результата в ветку output
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
